<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#090909" />
  <meta name="description" content="AI-powered setlist optimizer for live performers" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Setlist" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <title>Setlist Optimizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #090909; color: #fff; font-family: 'DM Sans', sans-serif; }
    #root { height: 100%; }
    #error-display { display:none; position:fixed; inset:0; background:#090909; color:#e85d3a;
      font-family:monospace; font-size:13px; padding:24px; overflow:auto; white-space:pre-wrap; z-index:9999; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    input, select, button { font-family: 'DM Sans', sans-serif; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="error-display"></div>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      var d = document.getElementById('error-display');
      d.style.display = 'block';
      d.textContent = 'JAVASCRIPT ERROR\n\n' + msg + '\n\nFile: ' + src + '\nLine: ' + line + ', Col: ' + col + '\n\n' + (err && err.stack ? err.stack : '');
    };
    window.addEventListener('unhandledrejection', function(e) {
      var d = document.getElementById('error-display');
      d.style.display = 'block';
      d.textContent = (d.textContent||'') + '\nUNHANDLED PROMISE REJECTION\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason));
    });
  </script>
  <script type="module" src="app6.js"></script>

</body>
</html>
